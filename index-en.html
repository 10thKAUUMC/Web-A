<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aido Navbar EN</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="navbar__shadow"></div>

    <div class="navbar__inner">
      <div class="navbar__left">
        <a href="#" class="navbar__brand">
          <div class="navbar__logo-box">🐱</div>
          <span class="navbar__logo-text">Aido</span>
        </a>
      </div>

      <div class="navbar__right">
        <nav class="navbar__menu">
          <a href="#" class="navbar__menu-item navbar__menu-item--active">Cat Friends</a>
          <a href="#" class="navbar__menu-item">Get Notified</a>
        </nav>

        <div class="navbar__lang-switch">
          <span class="navbar__lang-label">Language</span>
          <a href="index.html" class="navbar__lang-option">KO</a>
          <a href="index-en.html" class="navbar__lang-option navbar__lang-option--active">EN</a>
        </div>
      </div>
    </div>
  </header>

  <script>
    const menuItems = document.querySelectorAll('.navbar__menu-item');

    menuItems.forEach((item) => {
      item.addEventListener('click', (e) => {
        e.preventDefault();

        menuItems.forEach((menu) => {
          menu.classList.remove('navbar__menu-item--active');
        });

        item.classList.add('navbar__menu-item--active');
      });
    });
  </script>
</body>
</html>
