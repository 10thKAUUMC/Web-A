<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>TypeScript Todo</title>
</head>
<body>
    <div class="todo-container">
        <header class="todo-container__header">
            <h1> Mari Todo </h1>
        </header>

        <form id="form" class="todo-container__form">
            <input id="input" class="todo-container__input" placeholder="할 일을 입력해 주세요" required />
            <button type="submit" class="todo-container__button">추가</button>
        </form>

        <div class="render-container">
            <section class="render-container__section">
                <h2 class="render-container__title">할 일</h2>
                <ul id="list" class="render-container__list"></ul>
            </section>
            <section class="render-container__section">
                <h2 class="render-container__title">완료</h2>
                <ul id="done-list" class="render-container__list"></ul>
            </section>
        </div>
    </div>

    <script type="module" src="dist/index.js"></script>
</body>
</html>
